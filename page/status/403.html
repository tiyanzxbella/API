<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - ACCESS DENIED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Grotesk:wght@500;900&family=JetBrains+Mono:wght@800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #FF0044;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --yellow: #FFEE00;
            --gray: #1A1A1A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* Clean Solid Background Layer */
        .bg-accent {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140vw;
            height: 30vh;
            background: var(--red);
            transform: translate(-50%, -50%) rotate(-10deg);
            z-index: -1;
            box-shadow: 0 0 100px rgba(255, 0, 68, 0.2);
        }

        .main-card {
            background: var(--white);
            border: 10px solid var(--black);
            width: 90%;
            max-width: 580px;
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            transform: rotate(2deg);
            box-shadow: 20px 20px 0px var(--black);
            animation: card-in 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transition: transform 0.1s ease-out;
        }

        @keyframes card-in {
            0% {
                transform: translateY(50px) rotate(0deg) scale(0.9);
                opacity: 0;
            }

            100% {
                transform: translateY(0) rotate(2deg) scale(1);
                opacity: 1;
            }
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: var(--black);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-1 {
            background: var(--red);
        }

        .dot-2 {
            background: var(--yellow);
        }

        .dot-3 {
            background: #00FF88;
        }

        h1 {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 900;
            color: var(--black);
            line-height: 0.8;
            margin: 1rem 0;
            letter-spacing: -4px;
            position: relative;
        }

        .status-badge {
            background: var(--black);
            color: var(--yellow);
            padding: 8px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 2rem;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        p.warning-text {
            color: var(--black);
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 3rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.2;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .primary-btn {
            background: var(--black);
            color: var(--white);
            text-decoration: none;
            padding: 1.2rem 2.5rem;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            border: 4px solid var(--black);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 6px 6px 0px var(--red);
        }

        .primary-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--red);
            background: var(--red);
        }

        .primary-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--red);
        }

        /* Small Decorative Elements */
        .decor-line {
            position: absolute;
            background: var(--black);
            opacity: 0.1;
            height: 2px;
            width: 100px;
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 3rem 1rem;
                border-width: 6px;
                transform: rotate(0);
            }

            h1 {
                font-size: 4.5rem;
            }

            .primary-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="bg-accent"></div>

    <div class="main-card" id="card">
        <div class="top-bar">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
        </div>

        <div class="status-badge">FIREWALL_LOCK: ACTIVE</div>

        <h1>403</h1>

        <p class="warning-text">Your identification has been blacklisted. Access to this core is strictly prohibited.
        </p>

        <div class="btn-container">
            <a href="/" class="primary-btn">Exit System</a>
        </div>

        <!-- Corner decorative symbols -->
        <div
            style="position: absolute; bottom: 15px; right: 20px; color: var(--black); font-family: 'JetBrains Mono'; font-size: 0.7rem; opacity: 0.4;">
            SEC-ID: BANNED_NODE
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 900) return;
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) rotate(2deg)`;
        });
    </script>
</body>

</html>
